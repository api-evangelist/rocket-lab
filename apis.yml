name: Rocket Lab
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: Rocket Lab Corporation (Nasdaq RKLB) is an end-to-end space company providing launch
  services, spacecraft, satellite components, and on-orbit services. Its Electron rocket is the
  world's most frequently launched orbital small launch vehicle; the medium-lift Neutron rocket is
  in development. Rocket Lab Space Systems supplies Photon spacecraft, reaction wheels, star
  trackers, solar arrays, propulsion, separation systems, and composite structures to civil,
  national security, and commercial customers. Rocket Lab does not currently offer a public
  developer API.
